name: Deploy Full Stack

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Деплой Frontend на GitHub Pages
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Frontend deployed
        run: echo "✅ Frontend deployed to ${{ steps.deployment.outputs.page_url }}"

  # Триггер деплоя Backend на Render
  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "🔄 Triggering Render deploy..."
          curl -X POST "https://api.render.com/deploy/srv-xxx" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            || echo "⚠️ Render webhook not configured, auto-deploy will happen automatically"
      
      - name: Backend deploy status
        run: echo "✅ Backend will be auto-deployed by Render (Git integration)"

  # Итоговый статус
  deploy-summary:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
      - name: Show summary
        run: |
          echo "========================================"
          echo "✅ DEPLOYMENT COMPLETE"
          echo "========================================"
          echo "Frontend: https://tox1k332.github.io/smart-home-app/"
          echo "Backend: https://smart-home-api-l5dr.onrender.com"
          echo "========================================"
